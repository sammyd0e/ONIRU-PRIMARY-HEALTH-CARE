services:
  - type: web
    name: django-backend
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt && python backend/manage.py collectstatic --noinput"
    startCommand: "gunicorn clinic.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: clinic.settings
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        fromDatabase:
          name: oniru-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
    autoDeploy: true
    buildFilter:
      paths:
        - backend/**
databases:
  - name: oniru-db
    plan: free
    ipAllowList: []
